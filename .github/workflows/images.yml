name: images

# v0.2 (A5): container hardening. Enforce the image invariants on every change,
# and build base -> python once the base digest is really pinned. The build is
# skipped (with a notice) while Dockerfile.base still carries the placeholder
# all-zero digest, so this workflow is green today and activates the build
# automatically the moment a real debian digest is pinned for deployment.

on:
  push:
    paths:
      - "deploy/images/**"
      - ".github/workflows/images.yml"
      - "tests/test_images.py"
  pull_request:
    paths:
      - "deploy/images/**"
      - ".github/workflows/images.yml"
      - "tests/test_images.py"

jobs:
  invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: Enforce image invariants (no baked secrets, inheritance, non-root)
        run: python -m pytest tests/test_images.py -q

  build:
    runs-on: ubuntu-latest
    needs: invariants
    steps:
      - uses: actions/checkout@v7
      - name: Detect whether the base digest is really pinned
        id: digest
        run: |
          if grep -q 'FROM debian:bookworm-slim@sha256:0\{64\}' deploy/images/Dockerfile.base; then
            echo "pinned=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Dockerfile.base still has the placeholder digest; skipping image build until a real debian digest is pinned."
          else
            echo "pinned=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Build base image
        if: steps.digest.outputs.pinned == 'true'
        run: docker build -t kagura-agent:base -f deploy/images/Dockerfile.base deploy/images
      - name: Build python image (FROM base) and assert no secrets in history
        if: steps.digest.outputs.pinned == 'true'
        run: |
          docker build -t kagura-agent:python -f deploy/images/Dockerfile.python deploy/images
          # The image must carry no credential-looking env baked into any layer.
          if docker history --no-trunc kagura-agent:python | grep -Eiq 'AWS_SECRET_ACCESS_KEY|ANTHROPIC_API_KEY|CLOUDFLARE_API_TOKEN|GITHUB_TOKEN'; then
            echo "::error::a credential was baked into the python image history"
            exit 1
          fi
